name: Bug Report
description: Report something that is broken or surprising.
title: "Bug: "
labels:
  - bug
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the behavior and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include commands, config snippets with secrets removed, and any relevant logs.
      placeholder: |
        1. Run ...
        2. Configure ...
        3. See ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: AIMux version or commit SHA.
  - type: input
    id: bun
    attributes:
      label: Bun version
      placeholder: bun --version
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, shell, and any relevant provider or MCP server details.
