name: Feature Request
description: Suggest a new capability or integration.
title: "Feature: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do, and what is hard today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the behavior, command, config shape, or integration you would like.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: Mention any workaround or alternate design you considered.
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Links, examples, provider docs, or MCP server details.
